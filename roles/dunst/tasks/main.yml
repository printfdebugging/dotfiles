- name: (dunst) include archlinux tasks
  tags:
    - dunst
    - include
  ansible.builtin.include_tasks:
    file: arch.yml
  when: ansible_os_family == "Archlinux"

- name: (dunst) include voidlinux tasks
  tags:
    - dunst
    - include
  ansible.builtin.include_tasks:
    file: void.yml
  when: ansible_os_family == "Void"

- name: (dunst) create config directory
  become: false
  tags:
    - dunst
    - files
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config/dunst"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: (dunst) copy config file
  become: false
  tags:
    - dunst
    - files
  ansible.builtin.copy:
    src: dunstrc
    dest: /home/{{ ansible_user }}/.config/dunst/dunstrc
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: (dunst) save config file
  become: false
  tags:
    - save
    - save-dunst
  ansible.builtin.copy:
    src: /home/{{ ansible_user }}/.config/dunst/dunstrc
    dest: /home/{{ ansible_user }}/repos/dotfiles/roles/dunst/files/dunstrc
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0644

