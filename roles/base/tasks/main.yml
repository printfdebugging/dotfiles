    - figlet-fonts
    - lolcat-c
    - seahorse
    - valgrind

- name: (base) upgrade distribution
  tags:
    - base
    - packages
  community.general.xbps:
    upgrade: true

- name: (base) add user to network group
  tags:
    - base
    - system
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: network
    append: true

- name: (base) create downloads directory
  become: false
  tags:
    - base
    - files
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/downloads"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: (base) create .config directory
  become: false
  tags:
    - base
    - files
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: (base) copy user-dirs.dirs file
  tags:
    - base
    - files
  ansible.builtin.copy:
    src: user-dirs.dirs
    dest: /home/{{ ansible_user }}/.config/user-dirs.dirs
    owner: root
    group: root
    mode: 0644

- name: (base) create /home/{{ ansible_user }}/.local/share/fonts/ directory
  become: false
  tags:
    - gtk
    - files
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.local/share/fonts"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: (base) install fonts
  become: true
  tags:
    - base
    - fonts
    - packages
  ansible.builtin.shell:
    cmd: |
      if [ $(fc-list | grep "{{ item.font }}" | wc -l) -eq 0 ]; then
        cd /home/{{ ansible_user }}/.local/share/fonts
        curl -LO {{ item.url }}
        unzip {{ item.font }}.zip -d {{ item.font }}
      fi
  loop:
    [
      { font: "JetBrainsMono",  url: "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.0.0/JetBrainsMono.zip", },
    ]

- name: (base) copy twemoji font file
  become: true
  tags:
    - base
    - packages
  ansible.builtin.copy:
    src: twemoji
    dest: /home/{{ ansible_user }}/.local/share/fonts
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: (base) copy twemoji fontconfig
  become: true
  tags:
    - base
    - packages
  ansible.builtin.copy:
    src: 75-twemoji.conf
    dest: /etc/fonts/conf.d/75-twemoji.conf
    owner: root
    group: root
    mode: 0644
