- name: (base@archlinux) copy twemoji fontconfig
  become: true
  tags:
    - aur
    - packages
  ansible.builtin.copy:
    src: /usr/share/fontconfig/conf.avail/75-twemoji.conf
    dest: /etc/fonts/conf.d/75-twemoji.conf
    owner: root
    group: root
    mode: 0644

- name: (base@archlinux) revoke sudo without passwd
  become: true
  tags:
    - aur
    - packages
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/00_{{ ansible_user }}
    line: "{{ ansible_user }} ALL=(ALL) NOPASSWD: ALL"
    state: absent
    validate: "visudo -cf %s"
