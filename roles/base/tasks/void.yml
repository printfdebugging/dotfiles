    - sxiv
    - feh
    - openjdk

- name: (base) upgrade distribution
  tags:
    - base
    - packages
  community.general.xbps:
    upgrade: true

- name: (base) add user to network group
  tags:
    - base
    - system
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: network
    append: true
