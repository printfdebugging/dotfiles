    - gdb
    - rr
    - perf
    - ntfs-3g
    - obs
    - glade3
    - luarocks
    - qt5-styleplugins
    - qt5ct
    - ruff
    - i3lock-fancy
    - SFML-devel
    - glfw-devel
    - mesa-vulkan-radeon
    - Vulkan-Tools
    - vulkan-loader-devel
    - libXxf86vm-devel
    - glm
    - shaderc
    - gimp
    - xf86-video-amdgpu
    - xf86-video-ati
    - xf86-input-libinput
    - yarn
    - wget
    - curl
    - fontconfig
    - clang-tools-extra18
    - libnma
