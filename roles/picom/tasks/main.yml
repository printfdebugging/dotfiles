- name: ensure config directory exists
  become: false
  tags:
    - picom
    - files
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: copy config files to ~/.config/picom
  become: false
  tags:
    - picom
    - files
  ansible.builtin.copy:
    src: picom.conf
    dest: /home/{{ ansible_user }}/.config/picom.conf
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: copy back config files from ~/.config/picom
  become: false
  tags:
    - save
    - save-picom
  ansible.builtin.copy:
    src: /home/{{ ansible_user }}/.config/picom.conf
    dest: /home/{{ ansible_user }}/repos/dotfiles/roles/picom/files/picom.conf
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755
