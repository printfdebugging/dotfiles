- name: install picom on Archlinux
  tags:
    - picom
    - packages
  community.general.pacman:
    name: "{{ item }}"
    state: latest
    extra_args: "--nodeps --noconfirm --overwrite '*'"
  loop:
    - picom

- name: ensure config directory exists
  become: false
  tags:
    - picom
    - files
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: copy the config files
  become: false
  tags:
    - picom
    - files
  ansible.builtin.copy:
    src: picom.conf
    dest: /home/{{ ansible_user }}/.config/picom.conf
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: copy back config file from ~/.config/picom.conf
  become: false
  tags:
    - save
    - save-picom
  ansible.builtin.copy:
    src: /home/{{ ansible_user }}/.config/{{ item }}
    dest: "/home/{{ ansible_user }}/repos/dotfiles/roles/picom/files/{{ item }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755
  loop:
    - picom.conf
