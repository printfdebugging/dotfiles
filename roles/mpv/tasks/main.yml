- name: (mpv) include archlinux tasks
  tags:
    - mpv
    - include
  ansible.builtin.include_tasks:
    file: arch.yml
  when: ansible_os_family == "Archlinux"

- name: (mpv) include voidlinux tasks
  tags:
    - mpv
    - include
  ansible.builtin.include_tasks:
    file: void.yml
  when: ansible_os_family == "Void"

- name: (mpv) create config directory
  become: false
  tags:
    - mpv
    - files
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config/mpv"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: (mpv) create config directory
  become: false
  tags:
    - mpv
    - files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /home/{{ ansible_user }}/.config/mpv/{{ item }}
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755
  loop:
    - input.conf
    - mpv.conf

- name: (mpv) save config directory
  become: false
  tags:
    - save
    - save-mpv
  ansible.builtin.copy:
    src: /home/{{ ansible_user }}/.config/mpv/{{ item }}
    dest: /home/{{ ansible_user }}/repos/dotfiles/roles/mpv/files/{{ item }}
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0644
  loop:
    - input.conf
    - mpv.conf
