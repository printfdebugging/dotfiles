- name: include arch.yml
  tags:
    - include
  ansible.builtin.include_tasks:
    file: arch.yml
  when: ansible_os_family == "Archlinux"

- name: include void.yml
  tags:
    - include
  ansible.builtin.include_tasks:
    file: void.yml
  when: ansible_os_family == "Void"

- name: setup ZSH as system shell
  tags:
    - zsh
    - system
  ansible.builtin.user:
    name: "{{ item }}"
    shell: /usr/bin/zsh
  become: true
  loop:
    - root
    - "{{ ansible_user }}"

- name: copy zsh config files
  become: false
  tags:
    - zsh
    - files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /home/{{ ansible_user }}/{{ item }}
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: 0644
  loop:
    - .zshrc
    - .zprofile

# this one still fails.
- name: ensure .cache directory exists
  become: false
  tags:
    - zsh
    - files
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.cache/zsh"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: create the cache file for zsh
  become: false
  tags:
    - zsh
    - files
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/.cache/zsh/history
    state: touch
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: 0755

- name: copy back zsh config files
  become: false
  tags:
    - save
    - save-zsh
  ansible.builtin.copy:
    src: "/home/{{ ansible_user }}/{{ item }}"
    dest: /home/{{ ansible_user }}/repos/dotfiles/roles/zsh/files/{{ item }}
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: 0644
  loop:
    - .zshrc
    - .zprofile
