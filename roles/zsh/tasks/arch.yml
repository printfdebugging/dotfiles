- name: install zsh and additional packages
  tags:
    - zsh
    - packages
  community.general.pacman:
    name:
      - zsh
      - zsh-syntax-highlighting
      - zsh-completions
      - zsh-autosuggestions
    state: latest
    extra_args: "--nodeps --noconfirm --overwrite '*'"

- name: setup zSH as system shell
  tags:
    - zsh
    - system
  ansible.builtin.user:
    name: "{{ item }}"
    shell: /usr/bin/zsh
  become: true
  loop:
    - root
    - "{{ ansible_user }}"

- name: copy zsh config files
  become: false
  tags:
    - zsh
    - files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /home/{{ ansible_user }}/{{ item }}
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: 0644
  loop:
    - .zshrc
    - .zprofile

- name: ensure .cache directory exists
  become: false
  tags:
    - zsh
    - files
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.cache/zsh"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: create the cache file for zsh
  become: false
  tags:
    - zsh
    - files
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/.cache/zsh/history
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: 0755
