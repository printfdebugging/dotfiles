- name: (neovim) include archlinux tasks
  tags:
    - include
  ansible.builtin.include_tasks:
    file: arch.yml
  when: ansible_os_family == "Archlinux"

- name: (neovim) include voidlinux tasks
  tags:
    - include
  ansible.builtin.include_tasks:
    file: void.yml
  when: ansible_os_family == "Void"

- name: (neovim) copy config files
  become: false
  tags:
    - neovim
    - files
  ansible.builtin.copy:
    src: nvim
    dest: /home/{{ ansible_user }}/.config
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: 0755

- name: (neovim) save config files
  become: false
  tags:
    - save
    - save-neovim
  ansible.builtin.copy:
    src: /home/{{ ansible_user }}/.config/nvim
    dest: /home/{{ ansible_user }}/repos/dotfiles/roles/neovim/files
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: 0755
