- name: (gtk) create config directory
  become: false
  tags:
    - gtk
    - files
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config/gtk-3.0"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: (gtk) copy config file
  become: false
  tags:
    - gtk
    - files
  ansible.builtin.copy:
    src: settings.ini
    dest: /home/{{ ansible_user }}/.config/gtk-3.0/settings.ini
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: (gtk) copy back config file
  become: false
  tags:
    - save
    - save-gtk
  ansible.builtin.copy:
    src: /home/{{ ansible_user }}/.config/gtk-3.0/settings.ini
    dest: /home/{{ ansible_user }}/repos/dotfiles/roles/gtk-3.0/files/settings.ini
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0644
