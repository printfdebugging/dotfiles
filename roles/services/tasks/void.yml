- name: (services@voidlinux) stop other network services
  tags:
    - services
    - system
  community.general.runit:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - dhcpcd
    - wpa_supplicant
    - wicd

- name: (services@voidlinux) kill other network services
  tags:
    - services
    - system
  community.general.runit:
    name: "{{ item }}"
    state: killed
    enabled: false
  loop:
    - dhcpcd
    - wpa_supplicant
    - wicd

- name: (services@voidlinux) enable & start network manager
  tags:
    - services
    - system
  community.general.runit:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - dbus
    - NetworkManager

