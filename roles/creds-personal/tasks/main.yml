- name: (creds) create ssh directory
  become: false
  tags:
    - creds-personal
    - files-personal
  ansible.builtin.file:
    dest: "/home/{{ ansible_user }}/.ssh"
    state: directory
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: "0755"

- name: (creds) create public file
  become: false
  tags:
    - creds-personal
    - files-personal
  ansible.builtin.copy:
    content: "{{ public_ssh_key_file }}"
    dest: "/home/{{ ansible_user }}/.ssh/id_ed25519.pub"
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: "0644"

- name: (creds) create private file
  become: false
  tags:
    - creds-personal
    - files-personal
  ansible.builtin.copy:
    content: "{{ private_ssh_key_file }}"
    dest: "/home/{{ ansible_user }}/.ssh/id_ed25519"
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: "0600"

- name: (creds) create ssh config file
  become: false
  tags:
    - creds-personal
    - files-personal
  ansible.builtin.copy:
    content: "{{ ssh_config_file }}"
    dest: "/home/{{ ansible_user }}/.ssh/config"
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: "0644"

- name: (creds) create git config file
  become: false
  tags:
    - creds-personal
    - files-personal
  ansible.builtin.copy:
    content: "{{ git_config_file }}"
    dest: "/home/{{ ansible_user }}/.gitconfig"
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: "0644"
