- name: (awesome) install packages
  tags:
    - awesome
    - packages
  community.general.xbps:
    name: "{{ item }}"
    state: latest
  loop:
    - awesome

- name: (awesome) copy config files
  become: false
  tags:
    - awesome
    - files
  ansible.builtin.copy:
    src: awesome
    dest: /home/{{ ansible_user }}/.config
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: 0755

- name: (awesome) save config files
  become: false
  tags:
    - save
    - save-awesome
  ansible.builtin.copy:
    src: /home/{{ ansible_user }}/.config/awesome
    dest: /home/{{ ansible_user }}/personal/dotfiles/roles/awesome/files
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: 0755
