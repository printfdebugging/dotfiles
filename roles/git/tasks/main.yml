- name: (git) install packages
  tags:
    - git
    - packages
  community.general.xbps:
    name: "{{ item }}"
    state: latest
  loop:
    - git
    - openssh

- name: (git) create gitconfig file
  tags:
    - git
    - files
  copy:
    content: "{{ git_config_file }}"
    dest: "/home/{{ ansible_user }}/.gitconfig"
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: "0644"
  become: false

- name: (git) create gitconfig personal file
  tags:
    - git
    - files
  copy:
    content: "{{ git_config_personal_file }}"
    dest: "/home/{{ ansible_user }}/.gitconfig-personal"
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: "0644"
  become: false

- name: (git) create gitconfig work file
  tags:
    - git
    - files
  copy:
    content: "{{ git_config_work_file }}"
    dest: "/home/{{ ansible_user }}/.gitconfig-work"
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: "0644"
  become: false

- name: (git) gitlab rsa key
  become: false
  tags:
    - git
    - files
  ansible.builtin.lineinfile:
    dest: /home/{{ ansible_user }}/.ssh/known_hosts
    create: yes
    state: present
    line: "{{ lookup('pipe', 'ssh-keyscan -t rsa gitlab.com') }}"
    regexp: "^gitlab\\.com"

- name: (git) clone git repositories
  become: false
  tags:
    - git
    - files
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ item.path }}"
    update: no
  loop:
    [
      { repo: "{{ my_gitlab_handle }}/dotfiles.git",        path: "/home/{{ ansible_user }}/personal/dotfiles", },
      { repo: "{{ my_gitlab_handle }}/notes.git",           path: "/home/{{ ansible_user }}/personal/notes", },
    ]
