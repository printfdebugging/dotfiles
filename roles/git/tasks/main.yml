- name: (git) install packages
  tags:
    - git
    - packages
  community.general.xbps:
    name: "{{ item }}"
    state: latest
  loop:
    - git
    - openssh

- name: (git) create gitconfig file
  tags:
    - git
    - files
  copy:
    content: "{{ git_config_file }}"
    dest: "/home/{{ ansible_user }}/.gitconfig"
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: "0644"
  become: false

- name: (git) add remote rsa keys
  become: false
  tags:
    - git
    - files
  ansible.builtin.lineinfile:
    dest: /home/{{ ansible_user }}/.ssh/known_hosts
    create: yes
    state: present
    line: "{{ lookup('pipe', 'ssh-keyscan -t rsa {{ item }}') }}"
    regexp: "^{{ item }}"
  loop:
    - github.com

- name: (git) clone git repositories
  become: false
  tags:
    - git
    - files
  ansible.builtin.git:
    repo: "{{ my_github_handle }}/{{ item }}.git"
    dest: "/home/{{ ansible_user }}/repos/{{ item }}"
    update: no
  loop:
# public
  ## libreoffice projects
    - themes
    - keybindings
    - work-logging

  ## personal projects
    - dotfiles
    - printfdebugging

  ## neovim plugin experiments
    - neogit-commented
    - todo-comments-commented

# private
  ## admin repositories
    - books
    - worklogs
    - documents

  ## personal projects
    - sfml-blueprints
