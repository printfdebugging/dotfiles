- name: include distribution tasks
  tags:
    - git
    - include
  ansible.builtin.include_tasks: "{{ ansible_distribution | lower }}.yml"

- name: (git) add remote rsa keys
  become: false
  tags:
    - git
  ansible.builtin.lineinfile:
    dest: /home/{{ ansible_user }}/.ssh/known_hosts
    create: yes
    state: present
    line: "{{ lookup('pipe', 'ssh-keyscan -t rsa {{ item }}') }}"
    regexp: "^{{ item }}"
  loop:
    - github.com
    - gitlab.com

- name: (git) clone projects from gitlab
  become: false
  tags:
    - git
    - files
  ansible.builtin.git:
    repo: "{{ gitlab }}/{{ item }}.git"
    dest: "/home/{{ ansible_user }}/repos/{{ item }}"
    update: no
    recursive: false
  loop:
    - website
    - logs

- name: (git) clone projects from github
  become: false
  tags:
    - git
    - files
  ansible.builtin.git:
    repo: "{{ github }}/{{ item }}.git"
    dest: "/home/{{ ansible_user }}/repos/{{ item }}"
    update: no
    recursive: false
  loop:
    - dotfiles
    - ipc
    - learn-opengl
    - themes
    - sfml-blueprints
    - keybindings

    # forks
    - glfw
    - Craft
    - libuv
    - layman
