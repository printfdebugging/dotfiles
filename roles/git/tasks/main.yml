- name: (git) install packages
  tags:
    - git
    - packages
  community.general.xbps:
    name: "{{ item }}"
    state: latest
  loop:
    - git
    - github-cli
    - openssh

- name: (git) add remote rsa keys
  become: false
  tags:
    - git
    - files
  ansible.builtin.lineinfile:
    dest: /home/{{ ansible_user }}/.ssh/known_hosts
    create: yes
    state: present
    line: "{{ lookup('pipe', 'ssh-keyscan -t rsa {{ item }}') }}"
    regexp: "^{{ item }}"
  loop:
    - github.com

- name: (git) clone git repositories
  become: false
  tags:
    - git
    - files
  ansible.builtin.git:
    repo: "{{ my_github_handle }}/{{ item }}.git"
    dest: "/home/{{ ansible_user }}/repos/{{ item }}"
    update: no
  loop:
    - dotfiles
    - printfdebugging
    - logs
    - blog
    - themes
    - keybindings
    - sfml-blueprints
