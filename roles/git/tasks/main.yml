- name: (git) install packages
  tags:
    - bootstrap
    - git
    - packages
  community.general.xbps:
    name: "{{ item }}"
    state: latest
  loop:
    - git
    - openssh

- name: (git) add remote rsa keys
  become: false
  tags:
    - bootstrap
    - git
    - files
  ansible.builtin.lineinfile:
    dest: /home/{{ ansible_user }}/.ssh/known_hosts
    create: yes
    state: present
    line: "{{ lookup('pipe', 'ssh-keyscan -t rsa {{ item }}') }}"
    regexp: "^{{ item }}"
  loop:
    - github.com

- name: (git) clone github projects
  become: false
  tags:
    - git
    - files
  ansible.builtin.git:
    repo: "{{ my_github_handle }}/{{ item }}.git"
    dest: "/home/{{ ansible_user }}/repos/{{ item }}"
    update: no
  loop:
  # public
    - dotfiles
    - blog
  # private
    - suckless
    - vulkan
    - clrs
    - raytracer
    - opengl
    - sicp
    - monkeylang
    - lox
    - kohi
    - logs
    - libregex
    - libtags
    - editor
