- name: (git) include archlinux tasks
  tags:
    - git
    - include
  ansible.builtin.include_tasks:
    file: arch.yml
  when: ansible_os_family == "Archlinux"

- name: (git) include voidlinux tasks
  tags:
    - git
    - include
  ansible.builtin.include_tasks:
    file: void.yml
  when: ansible_os_family == "Void"

- name: (git) create gitconfig
  tags:
    - git
    - files
  copy:
    content: "{{ git_config_file }}"
    dest: "/home/{{ ansible_user }}/.gitconfig"
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: "0644"
  become: false

- name: (git) create repos directory
  become: false
  tags:
    - git
    - files
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/repos
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: (git) create downloads directory
  become: false
  tags:
    - git
    - files
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/downloads
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755

- name: (git) gitlab rsa key
  become: false
  tags:
    - git
    - files
  ansible.builtin.lineinfile:
    dest: /home/{{ ansible_user }}/.ssh/known_hosts
    create: yes
    state: present
    line: "{{ lookup('pipe', 'ssh-keyscan -t rsa gitlab.com') }}"
    regexp: "^gitlab\\.com"

- name: (git) clone git repositories
  become: false
  tags:
    - git
    - files
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ item.path }}"
    update: no
  loop:
    [

      # basic repositories
      { repo: "{{ my_gitlab_handle }}/chromium.git",                              path: "/home/{{ ansible_user }}/.config/chromium", },
      { repo: "{{ my_gitlab_handle }}/thunderbird.git",                           path: "/home/{{ ansible_user }}/.thunderbird", },

      # other repositores
      { repo: "{{ my_gitlab_handle }}/website.git",                               path: "/home/{{ ansible_user }}/repos/website", },
      { repo: "{{ my_gitlab_handle }}/dotfiles.git",                              path: "/home/{{ ansible_user }}/repos/dotfiles", },
      { repo: "{{ my_gitlab_handle }}/libreoffice-theme-template.git",            path: "/home/{{ ansible_user }}/repos/libreoffice-theme-template", },
      { repo: "{{ my_gitlab_handle }}/icecream-parlour-management-system.git",    path: "/home/{{ ansible_user }}/repos/icecream-parlour-management-system", },
      { repo: "{{ my_gitlab_handle }}/geometry-wars.git",                         path: "/home/{{ ansible_user }}/repos/geometry-wars", },
      { repo: "{{ my_gitlab_handle }}/interpreters.git",                          path: "/home/{{ ansible_user }}/repos/interpreters", },
      { repo: "{{ my_gitlab_handle }}/bouncing-shapes.git",                       path: "/home/{{ ansible_user }}/repos/bouncing-shapes", },
      { repo: "{{ my_gitlab_handle }}/learn-opengl.git",                          path: "/home/{{ ansible_user }}/repos/learn-opengl", },
      { repo: "{{ my_gitlab_handle }}/win32-qt-comparison.git",                  path: "/home/{{ ansible_user }}/repos/win32-qt-comparison", },
      { repo: "{{ my_gitlab_handle }}/nullptr.git",                               path: "/home/{{ ansible_user }}/repos/nullptr", },
    ]
