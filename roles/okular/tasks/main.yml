- name: (okular) install packages
  tags:
    - bootstrap
    - okular
    - packages
  community.general.xbps:
    name: "{{ item }}"
    state: latest
  loop:
    - okular

- name: (okular) copy config file
  become: false
  tags:
    - bootstrap
    - okular
    - files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /home/{{ ansible_user }}/.config/{{ item }}
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755
  loop:
    - okularpartrc
    - okularrc

- name: (okular) save config file
  become: false
  tags:
    - save
    - save-okular
  ansible.builtin.copy:
    src: /home/{{ansible_user}}/.config/{{ item }}
    dest: /home/{{ ansible_user }}/repos/dotfiles/roles/okular/files/{{ item }}
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: 0755
  loop:
    - okularpartrc
    - okularrc
