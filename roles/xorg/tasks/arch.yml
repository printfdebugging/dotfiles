- name: install xorg-server and surrounding packages
  tags:
    - xorg
    - packages
  community.general.pacman:
    name: "{{ item }}"
    state: latest
    extra_args: "--nodeps --noconfirm --overwrite '*'"
  loop:
    - xorg-server
    - xorg-xinit
    - xorg-xrandr
    - xorg-setxkbmap
    - xorg-xset
    - xcompmgr
    - xwallpaper
    - xclip
    - xsel
