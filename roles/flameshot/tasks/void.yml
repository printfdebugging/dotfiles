- name: install flameshot on voidlinux
  tags:
    - flameshot
    - packages
  community.general.xbps:
    name: flameshot
    state: latest

- name: ensure config directory exists
  become: false
  tags:
    - flameshot
    - files
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config/flameshot"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: copy config files to ~/.config/flameshot
  become: false
  tags:
    - flameshot
    - files
  ansible.builtin.copy:
    content: "{{ flameshot_config_file }}"
    dest: /home/{{ ansible_user }}/.config/flameshot/flameshot.ini
    group: "{{ ansible_user }}"
    owner: "{{ ansible_user }}"
    mode: 0755

