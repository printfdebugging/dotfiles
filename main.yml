---
- hosts: all
  become: true
  tags:
    - full
  tasks:
    - name: update cache
      ansible.builtin.package:
        update_cache: true

- hosts: all
  roles:
    - ssh
    - base
    - bin
    - flameshot
    - git
    - gtk
    - mpv
    - neovim
    - suckless
    - tmux
    - wallpapers
    - xorg
    - yt-dlp
    - zsh
    - awesome
    - dunst
